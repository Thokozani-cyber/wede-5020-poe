<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Volunteer or Sponsor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><h1>🐾 Paws & Claws Rescue</h1></div>
        <nav><ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="enquiry.html">Enquiry</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul></nav>
    </header>

    <main>
        <h2>Become a Volunteer or Sponsor</h2>
        <form id="enquiryForm" action="#" method="post">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">

            <label for="enquiryType">I want to:</label>
            <select id="enquiryType" name="enquiryType" required>
                <option value="">-- Select --</option>
                <option value="volunteer">Volunteer</option>
                <option value="sponsor">Become a Sponsor</option>
                <option value="both">Both</option>
            </select>

            <label for="message">Tell us more about your interest *</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Submit Enquiry</button>
        </form>
        <div id="formFeedback"></div>
    </main>

    <footer><p>&copy; 2026 Paws & Claws Animal Rescue</p></footer>
    <script src="js/script.js"></script>
</body>
</html>
